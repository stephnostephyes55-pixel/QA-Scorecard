<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Scorecard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;padding:24px;font-size:14px}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .sub{color:#6b6b67;font-size:13px;margin-bottom:20px}
  .sec{background:#fff;border:1px solid #e5e5e2;border-radius:12px;padding:16px 20px;margin-bottom:12px}
  .sec-lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .flbl{font-size:12px;color:#666;margin-bottom:4px}
  input[type=text],input[type=date],textarea{width:100%;font-size:13px;color:#1a1a18;background:#f9f9f7;border:1px solid #ddd;border-radius:8px;padding:8px 10px;outline:none}
  textarea{resize:vertical;min-height:64px}
  .srow{display:flex;gap:8px;margin-bottom:4px}
  .sbtn{flex:1;padding:10px 4px;font-size:13px;font-weight:600;border:1px solid #ddd;border-radius:8px;background:#f5f5f3;color:#888;cursor:pointer;text-align:center;transition:all .1s}
  .sbtn.s1{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
  .sbtn.s2{background:#FAEEDA;color:#633806;border-color:#FAC775}
  .sbtn.s3{background:#F1EFE8;color:#444441;border-color:#D3D1C7}
  .sbtn.s4{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
  .sbtn.s5{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
  .egrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .chip{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid #e5e5e2;border-radius:8px;cursor:pointer;font-size:12px;color:#333;background:#f9f9f7;line-height:1.4}
  .chip.cc{background:#FCEBEB;border-color:#F09595;color:#A32D2D}
  .chip.cm{background:#FAEEDA;border-color:#FAC775;color:#633806}
  .chip.cn{background:#F1EFE8;border-color:#D3D1C7;color:#444441}
  .cbox{width:14px;height:14px;min-width:14px;border:1.5px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:10px;font-weight:700}
  .cmark{display:none}
  .chip.cc .cmark,.chip.cm .cmark,.chip.cn .cmark{display:block}
  .mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .met{background:#f5f5f3;border-radius:8px;padding:10px 12px}
  .mval{font-size:24px;font-weight:600;color:#1a1a18}
  .gbtn{width:100%;padding:12px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:#085041;color:white;cursor:pointer}
  .gbtn:disabled{background:#ccc}
  @media(max-width:500px){.frow,.egrid,.mrow{grid-template-columns:1fr}}
</style>
</head>
<body>

<h1>QA Scorecard</h1>
<p class="sub">Hybrid scoring for Tracker sync</p>

<div class="sec">
  <div class="sec-lbl">Ticket info</div>
  <div class="frow">
    <div><div class="flbl">Ticket ID</div><input type="text" id="tid"></div>
    <div><div class="flbl">Agent name</div><input type="text" id="aname"></div>
    <div><div class="flbl">Date reviewed</div><input type="date" id="drev"></div>
    <div><div class="flbl">QA reviewer</div><input type="text" id="rname"></div>
  </div>
  <div><div class="flbl">Case summary</div><textarea id="csum"></textarea></div>
</div>

<div class="sec">
  <div class="sec-lbl">Overall quality score</div>
  <div class="srow">
    <div class="sbtn" onclick="setScore(1)">1</div>
    <div class="sbtn" onclick="setScore(2)">2</div>
    <div class="sbtn" onclick="setScore(3)">3</div>
    <div class="sbtn" onclick="setScore(4)">4</div>
    <div class="sbtn" onclick="setScore(5)">5</div>
  </div>
</div>

<div class="sec">
  <div class="sec-lbl">Errors Checklist</div>
  <div class="egrid">
    <div class="chip" data-t="c" onclick="tog(this)"><div class="cbox"><span class="cmark">✓</span></div>Critical Issue</div>
    <div class="chip" data-t="m" onclick="tog(this)"><div class="cbox"><span class="cmark">✓</span></div>Major Issue</div>
    <div class="chip" data-t="n" onclick="tog(this)"><div class="cbox"><span class="cmark">✓</span></div>Minor Issue</div>
  </div>
</div>

<div class="sec">
  <div class="sec-lbl">Summary</div>
  <div class="mrow">
    <div class="met"><div class="mval" id="mscore">—</div></div>
    <div class="met"><div class="mval" id="merrs">0</div></div>
    <div class="met"><div class="mval" id="mcoach">No</div></div>
  </div>
  <button class="gbtn" id="submitBtn" onclick="submitToSheet()">Submit</button>
</div>

<script>
var _sc=0,_errs=[],_coach=false;

function setScore(v){
  _sc=v;
  document.querySelectorAll('.sbtn').forEach((b,i)=> {
    b.className='sbtn';
    if(i+1===v) b.classList.add('s'+v);
  });
  document.getElementById('mscore').textContent=v;
}

function tog(el){
  var t=el.dataset.t, cls=t==='c'?'cc':t==='m'?'cm':'cn';
  el.classList.toggle(cls);
  _errs=Array.from(document.querySelectorAll('.cc,.cm,.cn')).map(e=>e.textContent.trim());
  if(document.querySelectorAll('.cc').length>0) _coach=true;
  document.getElementById('merrs').textContent=_errs.length;
  document.getElementById('mcoach').textContent=_coach?'Yes':'No';
}

async function submitToSheet() {
  const btn = document.getElementById('submitBtn');
  // PASTE YOUR GOOGLE WEB APP URL HERE
  const url = "YOUR_DEPLOYED_WEB_APP_URL"; 
  
  btn.textContent = "Submitting...";
  btn.disabled = true;

  const payload = {
    tid: document.getElementById('tid').value,
    aname: document.getElementById('aname').value,
    drev: document.getElementById('drev').value,
    rname: document.getElementById('rname').value,
    csum: document.getElementById('csum').value,
    score: _sc,
    errors: _errs,
    coach: _coach,
    notes: "" 
  };

  try {
    await fetch(url, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    alert("Submitted to Tracker!");
    location.reload(); 
  } catch (e) {
    alert("Sync error.");
    btn.textContent = "Submit";
    btn.disabled = false;
  }
}
document.getElementById('drev').valueAsDate=new Date();
</script>
</body>
